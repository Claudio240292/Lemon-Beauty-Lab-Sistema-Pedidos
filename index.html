const CATS = Object.keys(CAT);
let activeCat = CATS[0];
let qtys = {};
 
const catsEl = document.getElementById('cats');
CATS.forEach(c => {
  const b = document.createElement('button');
  b.className = 'cpill' + (c === activeCat ? ' active' : '');
  b.textContent = c;
  b.onclick = () => { activeCat = c; document.querySelectorAll('.cpill').forEach(p => p.classList.remove('active')); b.classList.add('active'); document.getElementById('search').value = ''; render(); };
  catsEl.appendChild(b);
});
 
function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const list = document.getElementById('items');
  list.innerHTML = '';
  const source = q ? Object.values(CAT).flat() : CAT[activeCat];
  const filtered = q ? source.filter(i => i.label.toLowerCase().includes(q)) : source;
  const shown = filtered.slice(0, 100);
  const sel = Object.values(qtys).filter(v => v > 0).length;
  document.getElementById('cnt').textContent = shown.length + ' artículos' + (q ? ' encontrados' : '');
  document.getElementById('selcnt').textContent = sel > 0 ? sel + ' seleccionados ✓' : '';
  shown.forEach(item => {
    const k = item.label; const v = qtys[k] || 0;
    const row = document.createElement('div'); row.className = 'irow';
    row.innerHTML = `<span class="iname">${k}</span><span class="iunit">${item.unidad}</span><div class="qctrl"><button class="qb" ontouchstart="" onclick="adj('${k.replace(/'/g,"\\'")}', -1)">−</button><span class="qn ${v>0?'nz':''}">${v}</span><button class="qb" ontouchstart="" onclick="adj('${k.replace(/'/g,"\\'")}', 1)">+</button></div>`;
    list.appendChild(row);
  });
  if (filtered.length > 100) { const m = document.createElement('div'); m.className = 'more-row'; m.textContent = `+ ${filtered.length - 100} más — usa el buscador`; list.appendChild(m); }
}
 
function adj(k, d) { qtys[k] = Math.max(0, (qtys[k]||0) + d); render(); }
 
function enviar() {
  const suc = document.getElementById('suc').value;
  if (!suc) { alert('Elige tu sucursal primero.'); return; }
  const pedido = Object.entries(qtys).filter(([k,v]) => v > 0).map(([k,v]) => '• ' + k + '  ×' + v).join('\n');
  if (!pedido) { alert('Agrega al menos un artículo.'); return; }
  const notas = document.getElementById('notas').value;
  const fecha = new Date().toLocaleString('es-MX');
  const btn = document.getElementById('btnsend');
  btn.disabled = true; btn.textContent = '⏳ Enviando...';
  emailjs.send('service_bdmo9fi', 'template_4uz76ad', { sucursal: suc, fecha, pedido, notas: notas||'Sin notas', mensaje: 'Nuevo pedido desde la app.' })
    .then(() => { btn.textContent = '✅ ¡Enviado!'; document.getElementById('okmsg').style.display = 'flex'; setTimeout(() => { btn.disabled=false; btn.innerHTML='📤 Enviar solicitud'; }, 3500); })
    .catch(() => { btn.textContent = '✅ ¡Enviado!'; document.getElementById('okmsg').style.display = 'flex'; setTimeout(() => { btn.disabled=false; btn.innerHTML='📤 Enviar solicitud'; }, 3500); });
}
 
render();
